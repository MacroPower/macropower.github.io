{{ define "main" }}
  {{- $name := "" -}}
  {{- with .File }}{{ $name = .BaseFileName }}{{ end -}}
  {{- $known := dict "about" true "cv" true -}}
  {{- if index $known $name -}}
    {{ partial (printf "page/%s.html" $name) . }}
  {{- else -}}
    <article class="up-page selectable">
      <header class="up-page-header">
        <h1>{{ .Title }}</h1>
      </header>
      <div class="up-page-body">
        {{ .Content }}
      </div>
    </article>
  {{- end -}}
{{ end }}
