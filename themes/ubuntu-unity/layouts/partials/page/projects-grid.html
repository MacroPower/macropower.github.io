{{- $projects := .projects -}}
<template id="up-project-folder-tpl">
  <span class="up-project-folder up-project-folder-lg" aria-hidden="true">
    {{ partial "icon.html" "glyphs/folder" }}
    <span class="up-project-folder-emblem">
      <svg viewBox="0 0 24 24"><use data-emblem-use href=""/></svg>
    </span>
  </span>
</template>
<section class="up-project-grid" data-up-project-grid aria-label="Projects">
  {{- range $p := $projects }}
    <button type="button"
            class="up-project-tile"
            data-up-project-tile
            data-name="{{ $p.name }}"
            data-language="{{ $p.language }}"
            {{ with $p.stars }}data-stars="{{ . }}"{{ end }}
            {{ with $p.forks }}data-forks="{{ . }}"{{ end }}
            data-updated="{{ $p.updated }}"
            data-topics="{{ delimit $p.topics " " }}"
            data-description="{{ $p.description }}"
            {{ with $p.license }}data-license="{{ . }}"{{ end }}
            data-url="{{ $p.url }}">
      {{ partial "page/icons/folder-emblem.html" (dict "language" $p.language) }}
      <span class="up-project-tile-label">{{ $p.name }}</span>
    </button>
  {{- end }}
  <div class="up-project-grid-empty" data-up-project-empty hidden>No projects match.</div>
</section>
