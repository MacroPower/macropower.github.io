{{- $dateFmt := site.Params.dateform | default "Jan 2, 2006" -}}

<article class="up-reader" data-up-reader>
  <a class="up-reader-up" href="/posts/" aria-label="Back to all posts">
    <svg width="11" height="11" viewBox="0 0 11 11" aria-hidden="true">
      <path d="M7.2 1.6 3 5.5l4.2 3.9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>All posts</span>
  </a>
  <div class="up-reader-inner selectable">
    <div class="up-reader-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format $dateFmt }}</time>
      {{- if site.Params.enableReadingTime }}
        <span class="up-reader-meta-sep">·</span>
        <span>{{ .ReadingTime }} min read</span>
      {{- end }}
      {{- range .Params.categories }}
        <span class="up-reader-meta-sep">·</span>
        <span class="up-reader-chip">#{{ . }}</span>
      {{- end }}
    </div>
    <h1 class="up-reader-title">{{ .Title }}</h1>
    <div class="up-reader-body" data-up-reader-body>
      {{ .Content }}
    </div>
    <div class="up-reader-signoff">— jacob@unity:~/blog$ <span class="up-reader-cursor">█</span></div>
  </div>
</article>
