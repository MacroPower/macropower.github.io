{{- $handle := (index (split (.Site.Params.author.name | default "user") " ") 0) | lower -}}
<div class="up-window-stage up-trash-stage" data-up-window="trash" hidden>
  <section class="up-window-chrome">
    <div class="up-titlebar" data-titlebar>
      <div class="up-tl-group">
        <button class="up-tl up-tl-close" type="button" aria-label="Close"><svg width="6" height="6" viewBox="0 0 6 6"><path d="M1 1 L5 5 M5 1 L1 5" stroke="#fff" stroke-width="1.1" stroke-linecap="round"/></svg></button>
        <button class="up-tl up-tl-min"   type="button" aria-label="Minimize"><svg width="6" height="6" viewBox="0 0 6 6"><path d="M1 4.2 L5 4.2" stroke="#fff" stroke-width="1.1" stroke-linecap="round"/></svg></button>
      </div>
      <span class="up-titlebar-text">Trash</span>
    </div>
    <div class="up-window-body">
      <div class="up-pathbar">
        <span class="up-pathbar-pill">{{ $handle }}</span>
        <span class="up-pathbar-sep" aria-hidden="true">›</span>
        <span class="up-pathbar-pill is-current">trash</span>
      </div>
      <div class="up-trash-empty">
        <svg width="68" height="76" viewBox="0 0 68 76" fill="none" stroke="#B5AFAA" stroke-width="2">
          <path d="M10 18 h48 l-4 54 a2 2 0 0 1-2 2 h-36 a2 2 0 0 1-2-2 z" fill="#E8E3DE" />
          <rect x="4" y="12" width="60" height="6" rx="1" fill="#D4CFC8" stroke="#B5AFAA"/>
          <rect x="26" y="4" width="16" height="8" rx="1" fill="#D4CFC8" stroke="#B5AFAA"/>
          <path d="M22 28 v36 M34 28 v36 M46 28 v36"/>
        </svg>
        <div class="up-trash-empty-headline">Trash is empty</div>
        <div class="up-trash-empty-detail">
          Nothing thrown away yet. Tried that essay about dotfiles three
          times — kept saving it.
        </div>
        <button type="button" class="up-trash-empty-btn" data-trash-empty>Empty Trash</button>
      </div>
    </div>
  </section>
</div>
