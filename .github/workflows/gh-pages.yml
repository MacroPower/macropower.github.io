name: github pages

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Keep hugo-version in sync with devbox.json.
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      # Keep DART_SASS_VERSION in sync with devbox.json.
      - name: Install Dart Sass
        env:
          DART_SASS_VERSION: 1.99.0
        run: |
          curl -fsSL -o dart-sass.tar.gz \
            "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -xf dart-sass.tar.gz
          echo "$PWD/dart-sass" >> "$GITHUB_PATH"
          rm dart-sass.tar.gz

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
